<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:block th:replace="~{layout/layout :: layout(~{::content})}">
    <div th:fragment="content">
        <main>
            <div class="container-fluid px-4">
                <h1 class="mt-4">LAM 고객사 관리</h1>
                <ol class="breadcrumb mb-4">
                    <li class="breadcrumb-item active">Dashboard</li>
                </ol>
                <div class="row">
                    <div class="col-xl-3 col-md-6">
                        <div class="card bg-primary mb-4 text-white">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">전체 유지보수 대상 건수</div>
                                    <div class="small text-white-50">Customers</div>
                                </div>

                              <div class="text-end">
                                    <div class="fs-3 fw-bold" th:text="${inspectionCount != null ? inspectionCount.totalInspectionCount : 0}">0</div>
                                    <div class="small text-white-50">Customers</div>
                                </div>

                            </div>
                            <div class="card-footer d-flex align-items-center justify-content-between">
                                <a class="small text-white stretched-link" href="/customer/inspectionAll">
                                    View Details
                                </a>
                                <div class="small text-white">
                                   <i class="fas fa-angle-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6">
                        <div class="card bg-primary mb-4 text-white">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">이번 달 정기점검 고객사</div>
                                    <div class="small text-white-50">Total Licenses</div>
                                </div>

                              <div class="text-end">
                                    <div class="fs-3 fw-bold" th:text="${inspectionCount != null ? inspectionCount.scheduledInspectionCount : 0}">0</div>
                                    <div class="small text-white-50">Licenses</div>
                                </div>
                            </div>
                            <div class="card-footer d-flex align-items-center justify-content-between">
                                <a class="small text-white stretched-link"  href="/customer/monthInspection">
                                    View Details
                                </a>
                                <div class="small text-white" >
                                    <i class="fas fa-angle-right"></i>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6">
                        <div class="card bg-warning text-white mb-4">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">정기점검 완료 고객사 수</div>
                                    <div class="small text-white-50">Active Licenses</div>
                                </div>
                               <div class="text-end">
                                    <div class="fs-3 fw-bold"   th:text="${inspectionCount != null ? inspectionCount.completedInspectionCount : 0}">0</div>
                                    <div class="small text-white-50">Licenses</div>
                                </div>
                            </div>
                            <div class="card-footer d-flex align-items-center justify-content-between">
                                <a class="small text-white stretched-link" href="/customers">
                                    View Details
                                </a>
                                <div class="small text-white">
                                    <i class="fas fa-angle-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-xl-3 col-md-6">
                        <div class="card bg-danger text-white mb-4">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">유지보수 만료예정</div>
                                    <div class="small text-white-50">Disabled Licenses</div>
                                </div>

                               <div class="text-end">
                                    <div class="fs-3 fw-bold"  th:text="${inspectionCount != null ? inspectionCount.expiringLicenseCount : 0}">0</div>
                                    <div class="small text-white-50">Licenses</div>
                                </div>
                            </div>
                            <div class="card-footer d-flex align-items-center justify-content-between">
                                <a class="small text-white stretched-link" href="/customers">
                                    View Details
                                </a>
                                <div class="small text-white">
                                    <i class="fas fa-angle-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div class="table-card">
            <div class="table-header">
                전체 고객사 현황
            </div>

            <div class="table-body">
                <table class="custom-table">
                    <thead>
                    <tr>
                        <th>고객명</th>
                        <th>사업자번호</th>
                        <th>고객 담당자</th>
                        <th>최근 점검일</th>
                        <th>구매 라이선스 수량</th>
                        <th>상세보기</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="customer : ${customerData}">
                        <td th:text="${customer.customerNm}"></td>
                        <td th:text="${customer.businessNo}"></td>
                        <td th:text="${customer.managerName}"></td>
                        <td th:text="${customer.lastInspectionDate != null
                     ? #temporals.format(customer.lastInspectionDate, 'yyyy-MM-dd')
                     : '-'}">
                        </td>
                        <td th:text="${customer.totalLicenseCount}"></td>
                        <td>
                            <a class="detail-btn"
                               th:href="@{/customer/detail/{id}(id=${customer.customerNo})}">
                                상세보기
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div>
