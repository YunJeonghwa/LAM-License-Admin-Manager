<!DOCTYPE html>
<html th:fragment="layout(content)" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title th:text="${title} ?: 'LAM'">LAM</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link th:href="@{/bootstrap/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body class="sb-nav-fixed">

<!-- HEADER -->
<div th:replace="~{layout/header :: header}"></div>

<div id="layoutSidenav">

    <!-- SIDENAV -->
    <div th:replace="~{layout/sidenav :: sidenav}"></div>

    <!-- CONTENT -->
    <div id="layoutSidenav_content">
        <main>
            <!-- 🔥 페이지별 content -->
         <div th:replace="${content}"></div>
        </main>

           <!-- FOOTER -->
            <div th:replace="~{layout/footer :: footer}"></div>
        </div>
</div>




<!-- JS (공통) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/bootstrap/js/scripts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
<script src="/bootstrap/assets/demo/chart-area-demo.js"></script>
<script src="/bootstrap/assets/demo/chart-bar-demo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script src="/bootstrap/js/datatables-simple-demo.js"></script>

</body>
</html>
